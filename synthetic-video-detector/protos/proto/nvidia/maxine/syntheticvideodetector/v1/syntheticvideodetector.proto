syntax = "proto3";

package nvidia.maxine.syntheticvideodetector.v1;

import "google/protobuf/empty.proto";

// The SyntheticVideoDetectorService provides APIs to detect synthetic/fake
// videos
// using the Hiera-based deep learning model.
service SyntheticVideoDetectorService {

  // DetectSyntheticVideo is a bidirectional streaming API to analyze video
  // files
  // for synthetic/fake content detection.
  //
  // The input stream should contain exactly one video file per RPC invocation,
  // split into chunks carried in the request messages. The server processes
  // the video and streams back detection results for that file.
  rpc DetectSyntheticVideo(stream DetectSyntheticVideoRequest)
      returns (stream DetectSyntheticVideoResponse) {}
}

// Input message for DetectSyntheticVideo API.
// Contains chunks of input video file data.
message DetectSyntheticVideoRequest {
  // Video file data chunk
  bytes video_file_data = 1;
}

// Output message for DetectSyntheticVideo API.
// Contains detection results or a keep alive message.
message DetectSyntheticVideoResponse {
  oneof stream_output {
    // Individual clip detection result (during processing)
    ClipResult clip_result = 1;

    // Final video analysis result
    VideoResult final_result = 2;

    // Keep alive signaling flag
    google.protobuf.Empty keepalive = 3;
  }
}

// Detection result for individual video clip (output CSV rows)
message ClipResult {
  // Clip index (frame index of middle frame)
  uint32 index = 1;

  // Raw model output logit for this clip
  float logit = 2;
}

// Final video analysis result
message VideoResult {
  // Final aggregated logit (tab['logit'].mean())
  float logit = 1;

  // Final probability (expit(logit))
  float probability = 2;

  // CSV data containing all clip results (index,logit format)
  string csv_data = 3;

  // Number of clips processed
  uint32 total_clips = 4;
}
